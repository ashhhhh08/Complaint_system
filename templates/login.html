{% extends "base.html" %}

{% block title %}User Login - Smart Complaint System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p>Sign in to manage your complaints</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">📧 Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">🔐 Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="auth-links">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Create one now</a></p>
            <p style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e7eb;"><a href="{{ url_for('admin_login') }}">Admin? Login here</a></p>
        </div>
    </div>
</div>

<style>
    main .container {
        padding: 0;
    }
</style>
{% endblock %}
